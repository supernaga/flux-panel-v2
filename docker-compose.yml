services:
  mysql:
    image: mysql:5.7
    container_name: flux-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --innodb_buffer_pool_size=256M
    networks:
      - flux-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  node-binary-init:
    image: 0xnetuser/node-binary:2.1.27
    container_name: node-binary-init
    volumes:
      - node_binary:/data/node
    restart: "no"

  backend:
    image: 0xnetuser/go-backend:2.1.27
    container_name: go-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      LOG_DIR: /app/logs
    expose:
      - "6365"
    volumes:
      - backend_logs:/app/logs
      - node_binary:/data/node
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/data/compose
    depends_on:
      mysql:
        condition: service_healthy
      node-binary-init:
        condition: service_completed_successfully
    networks:
      - flux-network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:6365/flow/test || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: 0xnetuser/nextjs-frontend:2.1.27
    container_name: nextjs-frontend
    restart: unless-stopped
    ports:
      # IPv6: set PANEL_LISTEN=[::] in .env for dual-stack (IPv4+IPv6)
      - "${PANEL_LISTEN:-0.0.0.0}:${PANEL_PORT:-6366}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flux-network


volumes:
  mysql_data:
    name: mysql_data
    driver: local
  backend_logs:
    name: backend_logs
    driver: local
  node_binary:
    name: node_binary
    driver: local


networks:
  flux-network:
    name: flux-network
    driver: bridge
    enable_ipv6: ${ENABLE_IPV6:-false}
